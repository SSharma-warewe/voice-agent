# Shared monorepo image. Each Railway service sets SERVICE_ROLE:
#   api | web | worker | agent | agent-lead | agent-booking | web-api | worker-agents | all
# Public traffic should hit the web service domain (proxies /api + /health).
# DATABASE_URL must point at Neon production (neondb) — set in Railway env.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "pnpm start:railway"
restartPolicyType = "ON_FAILURE"
