# Default Railway config when the repo root is used as a service.
# Prefer separate services with apps/api/railway.toml, apps/web/railway.toml,
# and packages/worker/railway.toml. Deploy the LiveKit agent to LiveKit Cloud,
# not Railway (root Dockerfile is for `lk agent deploy` only).
[build]
builder = "NIXPACKS"
dockerfilePath = ""
buildCommand = "pnpm install --frozen-lockfile"

[deploy]
startCommand = "pnpm --filter @voice-repo/api start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"