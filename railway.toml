# Root Railway service config for the LiveKit agent worker.
# The agent connects to LiveKit over WebSocket and does not serve HTTP.
# For the API, web, and pg-boss worker, use the per-package railway.toml files.
[build]
builder = "NIXPACKS"
dockerfilePath = ""
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @voice-repo/agent build"

[deploy]
startCommand = "pnpm --filter @voice-repo/agent start"
restartPolicyType = "ON_FAILURE"