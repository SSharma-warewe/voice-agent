# Root Railway service — builds and starts all 4 processes in one container.
# API binds to PORT (Railway health check). Web runs internally on 4173.
# For production, prefer separate services using the per-package railway.toml files:
#   /apps/api/railway.toml
#   /apps/web/railway.toml
#   /packages/worker/railway.toml
[build]
builder = "NIXPACKS"
dockerfilePath = ""
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @voice-repo/agent build && pnpm --filter @voice-repo/web build"

[deploy]
startCommand = "pnpm start:all"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"